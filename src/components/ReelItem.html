<video class="reels-video" playsinline preload="auto" loop></video>
<div
  class="floating-heart"
  data-bind="style:heartLeft:left style:heartTop:top class:isHeartAnimating:animate"
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    width="80"
    height="80"
    fill="#ff3040"
    stroke="#ff3040"
    stroke-width="0.5"
  >
    <path
      d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
    ></path>
  </svg>
</div>

<div class="reels-overlay">
  <div class="reels-sidebar">
    <div class="sidebar-item avatar-container">
      <img class="avatar" data-bind="attr:avatar:src" alt="Avatar" />
      <button
        class="follow-btn"
        data-bind="text:followBtnText class:isFollowing:following"
        data-action="toggleFollow"
      >
        +
      </button>
    </div>
    <div
      class="sidebar-item like-btn"
      data-bind="class:isLiked:liked class:isLikeAnimating:like-animating"
      data-action="toggleLike"
    >
      <svg
        class="icon heart-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
        ></path>
      </svg>
      <span class="count like-count" data-bind="text:likes">0</span>
    </div>
    <div
      class="sidebar-item comment-btn"
      role="button"
      aria-label="Open comments"
    >
      <svg
        class="icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"
        ></path>
      </svg>
      <span class="count">456</span>
    </div>
    <div class="sidebar-item">
      <svg
        class="icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
      <span class="count">Share</span>
    </div>
    <div class="sidebar-item">
      <svg
        class="icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="12" cy="12" r="1"></circle>
        <circle cx="12" cy="5" r="1"></circle>
        <circle cx="12" cy="19" r="1"></circle>
      </svg>
    </div>
  </div>

  <div class="reels-bottom">
    <div class="user-info">
      <span class="username" data-bind="text:username">@username</span>
      <span class="category" data-bind="text:category">Entertainment</span>
    </div>
    <div
      class="description-container"
      data-bind="class:isDescExpanded:expanded"
      data-action="toggleDescription"
    >
      <p class="description" data-bind="text:description">
        Experience the beauty of this amazing moment. Tap to read more about
        what's happening in this video and discover new perspectives...
      </p>
      <span class="more-btn">more</span>
    </div>
  </div>

  <div class="progress-container" data-action="seekVideo">
    <div class="progress-bar-bg">
      <div class="progress-bar" data-bind="style:progress:width"></div>
    </div>
  </div>
</div>
